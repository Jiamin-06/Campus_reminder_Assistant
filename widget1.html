<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>校园全能提醒小助手</title>
<style>
:root {
  --color-primary: #4A90D9;
  --color-accent: #FF6B35;
  --color-danger: #E74C3C;
  --color-warning: #F39C12;
  --color-success: #27AE60;
  --color-bg: #F0F4F8;
  --color-card: #FFFFFF;
  --color-text: #2C3E50;
  --color-text-light: #7F8C8D;
  --shadow: 0 4px 20px rgba(74, 144, 217, 0.15);
  --radius: 16px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--color-bg);
  color: var(--color-text);
  min-height: 100vh;
  padding: 20px;
}
.header {
  text-align: center;
  padding: 24px 0 20px;
}
.header h1 {
  font-size: 22px;
  font-weight: 700;
  color: var(--color-primary);
}
.header p {
  font-size: 13px;
  color: var(--color-text-light);
  margin-top: 4px;
}
.tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-bottom: 20px;
  padding: 0 10px;
}
.tab-btn {
  padding: 8px 14px;
  border: 2px solid transparent;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  background: var(--color-card);
  color: var(--color-text-light);
  transition: all 0.25s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.tab-btn.active {
  background: var(--color-primary);
  color: #fff;
  box-shadow: 0 4px 12px rgba(74, 144, 217, 0.4);
}
.tab-btn:hover:not(.active) {
  border-color: var(--color-primary);
  color: var(--color-primary);
}
.tab-content { display: none; }
.tab-content.active { display: block; }
.card {
  background: var(--color-card);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.card-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--color-primary);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--color-text);
  margin: 14px 0 8px;
  padding-bottom: 6px;
  border-bottom: 2px solid var(--color-bg);
}
.item-list { display: flex; flex-direction: column; gap: 10px; }
.item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px;
  background: var(--color-bg);
  border-radius: 12px;
  transition: transform 0.2s;
}
.item:hover { transform: translateX(4px); }
.item-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.item-icon.course { background: #E8F4FD; }
.item-icon.hw { background: #FEF3E8; }
.item-icon.exam { background: #FDECEC; }
.item-icon.express { background: #F3F9EC; }
.item-icon.balance { background: #F8E8F8; }
.item-info { flex: 1; min-width: 0; }
.item-title { font-size: 14px; font-weight: 600; color: var(--color-text); }
.item-sub { font-size: 12px; color: var(--color-text-light); margin-top: 2px; }
.item-tag {
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
}
.tag-red { background: #FDECEC; color: var(--color-danger); }
.tag-orange { background: #FEF3E8; color: var(--color-warning); }
.tag-green { background: #F3F9EC; color: var(--color-success); }
.tag-blue { background: #E8F4FD; color: var(--color-primary); }
.tag-purple { background: #F8E8F8; color: #8E44AD; }
.add-btn {
  width: 100%;
  padding: 12px;
  border: 2px dashed #CBD5E1;
  border-radius: 12px;
  background: transparent;
  color: var(--color-text-light);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.add-btn:hover {
  border-color: var(--color-primary);
  color: var(--color-primary);
  background: #E8F4FD;
}
.form-group { margin-bottom: 14px; }
.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--color-text);
  margin-bottom: 6px;
}
.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  padding: 10px 14px;
  border: 2px solid #E2E8F0;
  border-radius: 10px;
  font-size: 14px;
  font-family: inherit;
  transition: border-color 0.2s;
  background: #FAFBFC;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none;
  border-color: var(--color-primary);
}
.form-actions { display: flex; gap: 10px; margin-top: 16px; }
.btn {
  flex: 1;
  padding: 11px;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-primary { background: var(--color-primary); color: #fff; }
.btn-primary:hover { background: #3A7BC8; }
.btn-danger { background: var(--color-danger); color: #fff; }
.btn-danger:hover { background: #C0392B; }
.btn-secondary { background: var(--color-bg); color: var(--color-text); }
.btn-secondary:hover { background: #E2E8F0; }
.copy-bar {
  background: linear-gradient(135deg, var(--color-primary), #6BA3E0);
  color: #fff;
  padding: 14px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-top: 16px;
}
.copy-bar span { font-size: 13px; font-weight: 600; }
.copy-all-btn {
  padding: 8px 16px;
  background: rgba(255,255,255,0.25);
  border: 2px solid rgba(255,255,255,0.5);
  border-radius: 8px;
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
}
.copy-all-btn:hover { background: rgba(255,255,255,0.4); }
.modal {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal.active { display: flex; }
.modal-content {
  background: var(--color-card);
  border-radius: var(--radius);
  padding: 24px;
  width: 100%;
  max-width: 480px;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.modal-header h3 { font-size: 17px; color: var(--color-text); }
.modal-close {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: none;
  background: var(--color-bg);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { background: #E2E8F0; }
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--color-text-light);
}
.empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }
.del-btn {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: none;
  background: #FDECEC;
  color: var(--color-danger);
  font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.del-btn:hover { background: var(--color-danger); color: #fff; }
.countdown-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 700;
}
.countdown-badge.urgent { background: #FDECEC; color: var(--color-danger); }
.countdown-badge.warning { background: #FEF3E8; color: var(--color-warning); }
.countdown-badge.safe { background: #F3F9EC; color: var(--color-success); }
.stat-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 16px;
}
.stat-card {
  background: var(--color-card);
  border-radius: 12px;
  padding: 16px 12px;
  text-align: center;
  box-shadow: var(--shadow);
}
.stat-num { font-size: 24px; font-weight: 800; color: var(--color-primary); }
.stat-label { font-size: 11px; color: var(--color-text-light); margin-top: 4px; }
/* 固定格式输出区 */
.output-section {
  background: var(--color-card);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.output-section-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--color-primary);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.output-preview {
  background: #1E293B;
  color: #E2E8F0;
  border-radius: 12px;
  padding: 16px;
  font-size: 13px;
  line-height: 2;
  white-space: pre-wrap;
  font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
  max-height: 280px;
  overflow-y: auto;
  cursor: pointer;
  transition: box-shadow 0.2s;
  margin-bottom: 14px;
}
.output-preview:hover {
  box-shadow: 0 0 0 2px var(--color-primary);
}
.output-preview .line-title { color: #60A5FA; }
.output-preview .line-hw { color: #FCD34D; }
.output-preview .line-exam { color: #F87171; }
.output-preview .line-express { color: #86EFAC; }
.output-preview .line-balance { color: #C4B5FD; }
.output-preview .line-todo { color: #34D399; }
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-top: 24px;
  padding-top: 20px;
  border-top: 2px solid var(--color-bg);
}
.navi-link {
  flex: 1;
  max-width: 200px;
  padding: 12px;
  border-radius: 12px;
  border: 2px solid var(--color-bg);
  background: var(--color-card);
  text-align: center;
  text-decoration: none;
  color: var(--color-text);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.navi-link:hover { border-color: var(--color-primary); color: var(--color-primary); }
.navi-link .navi-icon { font-size: 24px; margin-bottom: 4px; }
</style>
</head>
<body>
<header class="header">
  <h1>🏫 校园全能提醒小助手</h1>
  <p>5大痛点 · 1键汇总 · 轻松管理大学生活</p>
</header>

<div class="tabs" id="mainTabs">
  <button class="tab-btn active" data-tab="board">📋 今日看板</button>
  <button class="tab-btn" data-tab="courses">📚 课程表</button>
  <button class="tab-btn" data-tab="homework">📝 作业</button>
  <button class="tab-btn" data-tab="exams">📖 考试考证</button>
  <button class="tab-btn" data-tab="express">📦 快递</button>
  <button class="tab-btn" data-tab="balance">💰 余额预警</button>
</div>

<!-- 今日看板 -->
<div class="tab-content active" id="tab-board">
  <div class="stat-grid" id="statGrid"></div>
  <div class="copy-bar">
    <span>📋 一键复制今日全部提醒</span>
    <button class="copy-all-btn" id="copyTodayBtn" onclick="copyToday()">📋 复制全部</button>
  </div>

  <!-- 固定格式输出预览 -->
  <div class="output-section" style="margin-top:16px">
    <div class="output-section-title">📋 今日提醒</div>
    <div class="output-preview" id="widget1Output" onclick="copyToday()"></div>
  </div>

  <div id="boardCourse"></div>
  <div id="boardHw"></div>
  <div id="boardExam"></div>
  <div id="boardExpress"></div>
  <div id="boardBalance"></div>
</div>

<!-- 课程表 -->
<div class="tab-content" id="tab-courses">
  <div class="card">
    <div class="card-title">📚 本周课程表</div>
    <div class="item-list" id="courseList"></div>
    <button class="add-btn" onclick="openModal('courseModal')">➕ 添加课程</button>
  </div>
</div>

<!-- 作业 -->
<div class="tab-content" id="tab-homework">
  <div class="card">
    <div class="card-title">📝 作业截止倒计时</div>
    <div class="item-list" id="hwList"></div>
    <button class="add-btn" onclick="openModal('hwModal')">➕ 添加作业</button>
  </div>
</div>

<!-- 考试 -->
<div class="tab-content" id="tab-exams">
  <div class="card">
    <div class="card-title">📖 考试考证倒计时</div>
    <div class="item-list" id="examList"></div>
    <button class="add-btn" onclick="openModal('examModal')">➕ 添加考试</button>
  </div>
</div>

<!-- 快递 -->
<div class="tab-content" id="tab-express">
  <div class="card">
    <div class="card-title">📦 快递取件提醒</div>
    <div class="item-list" id="expressList"></div>
    <button class="add-btn" onclick="openModal('expressModal')">➕ 添加快递</button>
  </div>
</div>

<!-- 余额 -->
<div class="tab-content" id="tab-balance">
  <div class="card">
    <div class="card-title">💰 校园卡 / 电费余额预警</div>
    <div class="item-list" id="balanceList"></div>
    <button class="add-btn" onclick="openModal('balanceModal')">➕ 添加余额记录</button>
  </div>
</div>

<!-- 快捷导航 -->
<div class="navi-links">
  <div class="navi-link" onclick="location.href='widget2.html'">
    <div class="navi-icon">🤖</div>
    <div>AI 录入节点</div>
  </div>
  <div class="navi-link" onclick="location.href='widget3.html'">
    <div class="navi-icon">⚡</div>
    <div>自动处理节点</div>
  </div>
</div>

<!-- 模态框：课程 -->
<div class="modal" id="courseModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>📚 添加课程</h3>
      <button class="modal-close" onclick="closeModal('courseModal')">×</button>
    </div>
    <div class="form-group">
      <label>课程名称</label>
      <input type="text" id="courseName" placeholder="如：高等数学">
    </div>
    <div class="form-group">
      <label>上课时间</label>
      <select id="courseDay">
        <option value="1">周一</option>
        <option value="2">周二</option>
        <option value="3">周三</option>
        <option value="4">周四</option>
        <option value="5">周五</option>
        <option value="6">周六</option>
        <option value="7">周日</option>
      </select>
    </div>
    <div class="form-group">
      <label>节次</label>
      <select id="courseSlot">
        <option value="1-2">第1-2节</option>
        <option value="3-4">第3-4节</option>
        <option value="5-6">第5-6节</option>
        <option value="7-8">第7-8节</option>
        <option value="9-10">第9-10节(晚)</option>
      </select>
    </div>
    <div class="form-group">
      <label>上课地点</label>
      <input type="text" id="courseRoom" placeholder="如：教学楼A301">
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal('courseModal')">取消</button>
      <button class="btn btn-primary" onclick="addCourse()">确认添加</button>
    </div>
  </div>
</div>

<!-- 模态框：作业 -->
<div class="modal" id="hwModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>📝 添加作业</h3>
      <button class="modal-close" onclick="closeModal('hwModal')">×</button>
    </div>
    <div class="form-group">
      <label>作业名称</label>
      <input type="text" id="hwName" placeholder="如：第三章习题">
    </div>
    <div class="form-group">
      <label>所属课程</label>
      <input type="text" id="hwCourse" placeholder="如：高等数学">
    </div>
    <div class="form-group">
      <label>截止日期</label>
      <input type="date" id="hwDue">
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal('hwModal')">取消</button>
      <button class="btn btn-primary" onclick="addHw()">确认添加</button>
    </div>
  </div>
</div>

<!-- 模态框：考试 -->
<div class="modal" id="examModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>📖 添加考试</h3>
      <button class="modal-close" onclick="closeModal('examModal')">×</button>
    </div>
    <div class="form-group">
      <label>考试名称</label>
      <input type="text" id="examName" placeholder="如：大学英语四级">
    </div>
    <div class="form-group">
      <label>考试类型</label>
      <select id="examType">
        <option value="cet4">英语四级</option>
        <option value="cet6">英语六级</option>
        <option value="kaoyan">考研</option>
        <option value="final">期末考试</option>
        <option value="teacher">教师资格证</option>
        <option value="other">其他</option>
      </select>
    </div>
    <div class="form-group">
      <label>考试日期</label>
      <input type="date" id="examDate">
    </div>
    <div class="form-group">
      <label>考试地点</label>
      <input type="text" id="examRoom" placeholder="如：教学楼B201（选填）">
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal('examModal')">取消</button>
      <button class="btn btn-primary" onclick="addExam()">确认添加</button>
    </div>
  </div>
</div>

<!-- 模态框：快递 -->
<div class="modal" id="expressModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>📦 添加快递</h3>
      <button class="modal-close" onclick="closeModal('expressModal')">×</button>
    </div>
    <div class="form-group">
      <label>快递单号</label>
      <input type="text" id="expressNo" placeholder="如：SF1234567890">
    </div>
    <div class="form-group">
      <label>快递类型</label>
      <select id="expressType">
        <option value="顺丰">顺丰速运</option>
        <option value="菜鸟">菜鸟驿站</option>
        <option value="京东">京东快递</option>
        <option value="邮政">邮政EMS</option>
        <option value="其他">其他</option>
      </select>
    </div>
    <div class="form-group">
      <label>预计到达日期</label>
      <input type="date" id="expressDate">
    </div>
    <div class="form-group">
      <label>取货地点</label>
      <input type="text" id="expressLoc" placeholder="如：菜鸟驿站3号门">
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal('expressModal')">取消</button>
      <button class="btn btn-primary" onclick="addExpress()">确认添加</button>
    </div>
  </div>
</div>

<!-- 模态框：余额 -->
<div class="modal" id="balanceModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>💰 添加余额记录</h3>
      <button class="modal-close" onclick="closeModal('balanceModal')">×</button>
    </div>
    <div class="form-group">
      <label>账户类型</label>
      <select id="balanceType">
        <option value="校园卡">校园卡</option>
        <option value="电费">电费余额</option>
        <option value="水费">水费余额</option>
        <option value="网费">网费余额</option>
      </select>
    </div>
    <div class="form-group">
      <label>当前余额（元）</label>
      <input type="number" id="balanceAmount" placeholder="如：50">
    </div>
    <div class="form-group">
      <label>预警阈值（元）低于此值提醒</label>
      <input type="number" id="balanceThreshold" placeholder="如：10">
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal('balanceModal')">取消</button>
      <button class="btn btn-primary" onclick="addBalance()">确认添加</button>
    </div>
  </div>
</div>

<script>
// ========== 数据层 ==========
const data = {
  courses: [],
  homeworks: [],
  exams: [],
  expresses: [],
  balances: []
};

function initData(externalData) {
  if (externalData) {
    if (externalData.courses) data.courses = externalData.courses;
    if (externalData.homeworks) data.homeworks = externalData.homeworks;
    if (externalData.exams) data.exams = externalData.exams;
    if (externalData.expresses) data.expresses = externalData.expresses;
    if (externalData.balances) data.balances = externalData.balances;
  }
  renderAll();
}

// ========== 工具函数 ==========
function diffDays(dateStr) {
  if (!dateStr) return 999;
  const target = new Date(dateStr);
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  target.setHours(0, 0, 0, 0);
  return Math.ceil((target - today) / 86400000);
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return `${d.getMonth()+1}月${d.getDate()}日`;
}

function dayName(day) {
  return ['周日','周一','周二','周三','周四','周五','周六'][day];
}

function todayDayOfWeek() {
  return new Date().getDay() || 7;
}

function countdownBadge(days) {
  if (days <= 0) return '<span class="countdown-badge urgent">⚠️ 已到期</span>';
  if (days <= 1) return '<span class="countdown-badge urgent">🔴 仅剩1天</span>';
  if (days <= 3) return '<span class="countdown-badge warning">🟡 ' + days + '天后</span>';
  return '<span class="countdown-badge safe">🟢 ' + days + '天后</span>';
}

function addCourse() {

function addHw() {

  const course = document.getElementById('hwCourse').value.trim();

  closeModal('hwModal');
  clearHwForm();
  renderAll();
}

function addExam() {
  const name = document.getElementById('examName').value.trim();
  const type = document.getElementById('examType').value;
  const date = document.getElementById('examDate').value;
  const room = document.getElementById('examRoom').value.trim();

function addExpress() {

function addBalance() {
  const type = document.getElementById('balanceType').value;
  const amount = parseFloat(document.getElementById('balanceAmount').value);

// ========== 固定格式输出（核心新增功能） ==========
function buildFixedOutput() {
  const today = todayDayOfWeek();
  const todayCourses = data.courses.filter(c => c.day === today);
  const urgentHw = data.homeworks.filter(h => diffDays(h.due) >= 0).sort((a,b) => diffDays(a.due) - diffDays(b.due));
  const urgentExams = data.exams.filter(e => diffDays(e.date) >= 0).sort((a,b) => diffDays(a.date) - diffDays(b.date));
  const readyExpress = data.expresses.filter(ex => diffDays(ex.date) <= 0);
  const warnBalances = data.balances.filter(b => b.amount <= b.threshold);

  // 今日课表
  let courseInfo = '今日无课';
  if (todayCourses.length > 0) {
    courseInfo = todayCourses.map(c => `${c.name}(${c.slot})`).join('、');
  }

  // 作业提醒
  let hwInfo = '暂无待完成作业';
  if (urgentHw.length > 0) {
    hwInfo = urgentHw.slice(0, 3).map(h => {
      const days = diffDays(h.due);
      const tag = days <= 0 ? '⚠️已到期' : days === 1 ? '🔴明天截止' : days <= 3 ? `🟡${days}天后截止` : `🟢${days}天后截止`;
      return `${h.name}（${h.course}）${tag}`;
    }).join('；');
  }

  // 考试提醒
  let examInfo = '暂无近期考试';
  if (urgentExams.length > 0) {
    examInfo = urgentExams.slice(0, 3).map(e => {
      const days = diffDays(e.date);
      return `${e.name}倒计时${days}天`;
    }).join('；');
  }

  // 快递信息
  let expressInfo = '暂无待取快递';
  if (readyExpress.length > 0) {
    expressInfo = readyExpress.map(ex => `${ex.type}(${ex.no})${ex.loc ? '在'+ex.loc : ''}`).join('、');
  } else {
    const upcomingExpress = data.expresses.filter(ex => diffDays(ex.date) > 0).sort((a,b) => diffDays(a.date) - diffDays(b.date));
    if (upcomingExpress.length > 0) {
      const next = upcomingExpress[0];
      expressInfo = `${next.type}(${next.no})预计${diffDays(next.date)}天后到达`;
    }
  }

  // 余额预警
  let balanceInfo = '余额充足，无预警';
  if (warnBalances.length > 0) {
    balanceInfo = warnBalances.map(b => `⚠️${b.type}余额¥${b.amount}（低于¥${b.threshold}预警线）`).join('；');
  }

  // 今日待办汇总
  const todoItems = [];
  if (todayCourses.length > 0) todoItems.push(`${todayCourses.length}节课程`);
  const todayHw = data.homeworks.filter(h => diffDays(h.due) === 0);
  if (todayHw.length > 0) todoItems.push(`⚠️${todayHw.length}项作业今日截止`);
  if (readyExpress.length > 0) todoItems.push(`📦${readyExpress.length}件快递可取`);
  if (warnBalances.length > 0) todoItems.push(`💰${warnBalances.length}个账户余额不足`);
  let todoInfo = todoItems.length > 0 ? todoItems.join('、') : '今日事项已全部完成，继续加油！🎉';

  return `【校园全能提醒小助手】\n📅 今日课表：${courseInfo}\n📝 作业倒计时：${hwInfo}\n📚 考试倒计时：${examInfo}\n📦 快递提醒：${expressInfo}\n💰 余额预警：${balanceInfo}\n✅ 今日待办：${todoInfo}`;
}

function colorizeOutput(text) {
  return text
    .replace(/^(【.*?】)$/gm, '<span class="line-title">$1</span>')
    .replace(/^(📅 今日课表：.*)$/gm, '<span class="line-title">$1</span>')
    .replace(/^(📝 作业倒计时：.*)$/gm, '<span class="line-hw">$1</span>')
    .replace(/^(📚 考试倒计时：.*)$/gm, '<span class="line-exam">$1</span>')
    .replace(/^(📦 快递提醒：.*)$/gm, '<span class="line-express">$1</span>')
    .replace(/^(💰 余额预警：.*)$/gm, '<span class="line-balance">$1</span>')
    .replace(/^(✅ 今日待办：.*)$/gm, '<span class="line-todo">$1</span>');
}
